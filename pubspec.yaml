name: animal_timer
description: "AnimalTimer - A premium visual timer for kids (3-8 years old)"
publish_to: 'none'
version: 1.0.2604171111+678911

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  audioplayers: ^6.1.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/buttons/
    - assets/images/cat/
    - assets/audio/
  # Uncomment when you add Nunito .ttf files to assets/fonts/
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
  #       - asset: assets/fonts/Nunito-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Nunito-ExtraBold.ttf
  #         weight: 800
  #       - asset: assets/fonts/Nunito-Black.ttf
  #         weight: 900
