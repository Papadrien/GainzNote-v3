name: gainznote
description: Carnet d'entraînement de musculation
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # État & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Base de données locale
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Export / Import
  share_plus: ^9.0.0
  file_picker: ^8.0.3

  # Utilitaires
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
