name: animal_timer
description: "AnimalTimer - A premium visual timer for kids (3-8 years old)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_svg: ^2.0.10
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
  # Uncomment when you add Nunito .ttf files to assets/fonts/
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
  #       - asset: assets/fonts/Nunito-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Nunito-ExtraBold.ttf
  #         weight: 800
  #       - asset: assets/fonts/Nunito-Black.ttf
  #         weight: 900
