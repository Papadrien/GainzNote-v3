name: animal_timer
description: "AnimalTimer - A premium visual timer for kids (3-8 years old)"
publish_to: 'none'
version: 1.0.0+1776862928

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.6.1
  audioplayers: ^6.1.0
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0
  package_info_plus: ^8.1.0
  shared_preferences: ^2.5.3
  wakelock_plus: ^1.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/cat/
    - assets/images/chicken/
    - assets/images/crocodile/
    - assets/images/dog/
    - assets/images/pony/
    - assets/images/shark/
    - assets/audio/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
