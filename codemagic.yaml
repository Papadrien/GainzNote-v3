workflows:
  # ═══════════════════════════════════════════════
  # iOS DEBUG — Déclenchement manuel uniquement
  # ═══════════════════════════════════════════════
  ios-debug:
    name: iOS Debug
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.4
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Generate localizations
        script: flutter gen-l10n

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Run tests
        script: flutter test

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS (Debug, no codesign)
        script: flutter build ios --debug --no-codesign

      - name: Log version
        script: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "📦 iOS Debug build validated — version ${VERSION}"
