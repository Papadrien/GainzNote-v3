# ═══════════════════════════════════════════════════════════════════════════════
# AnimalTimer — CodeMagic CI/CD Configuration
# ═══════════════════════════════════════════════════════════════════════════════

definitions:
  # ── Environnement Flutter commun ─────────────────────────────────────────
  flutter_env: &flutter_env
    flutter: 3.22.3
    xcode: latest
    cocoapods: default

  # ── Scripts partagés ─────────────────────────────────────────────────────
  scripts:
    - &remove_v1_registrant
      name: 🧹 Remove legacy v1 plugin registrant
      script: |
        rm -rf android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
        rm -rf android/app/src/main/java/io/flutter/plugins
        rm -rf android/app/src/main/java/io/flutter
        rm -rf android/app/src/main/java/io
        echo "v1 registrant removed (if it existed)"

    - &get_dependencies
      name: 📦 Get Flutter dependencies
      script: flutter pub get

    - &run_code_gen
      name: ⚙️  Run code generation (freezed + riverpod)
      script: dart run build_runner build --delete-conflicting-outputs

    - &run_tests
      name: 🧪 Run unit tests
      script: flutter test --coverage

    - &analyze
      name: 🔍 Flutter analyze
      script: flutter analyze --no-fatal-infos

# ═══════════════════════════════════════════════════════════════════════════════
# WORKFLOWS
# ═══════════════════════════════════════════════════════════════════════════════
workflows:

  # ─────────────────────────────────────────────────────────────────────────
  # 1. ANDROID — Debug
  # ─────────────────────────────────────────────────────────────────────────
  android-debug:
    name: 🤖 Android Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: *flutter_env
      android_signing:
        - android_debug_keystore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - *remove_v1_registrant
      - *get_dependencies
      - *run_code_gen
      - *analyze
      - *run_tests
      - name: 🏗️  Build Android Debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  # ─────────────────────────────────────────────────────────────────────────
  # 2. iOS — Debug (Simulator build)
  # ─────────────────────────────────────────────────────────────────────────
  ios-debug:
    name: 🍎 iOS Debug Build
    max_build_duration: 45
    instance_type: mac_mini_m2
    working_directory: .
    environment:
      flutter: *flutter_env
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: 🔍 Pre-build Cleanup
        script: |
          # Supprimer les fichiers générés qui pourraient être en conflit
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          rm -rf ios/Flutter/ephemeral/
      - *get_dependencies
      - *run_code_gen
      - *analyze
      - *run_tests
      - name: 📦 Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: 🏗️  Build iOS Debug (no codesign)
        script: |
          flutter build ios --debug --no-codesign --simulator
    artifacts:
      - build/ios/iphonesimulator/Runner.app

  # ─────────────────────────────────────────────────────────────────────────
  # 3. FULL RELEASE — Android + iOS
  # ─────────────────────────────────────────────────────────────────────────
  release-all:
    name: 🚀 Full Release — Android + iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: *flutter_env
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.animaltimer.app
      android_signing:
        - android_release_keystore
      vars:
        BUNDLE_ID: "com.animaltimer.app"
        PACKAGE_NAME: "com.animaltimer.app"
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - *remove_v1_registrant
      - name: 🧹 iOS Cleanup
        script: |
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
      - *get_dependencies
      - *run_code_gen
      - *analyze
      - *run_tests
      - name: 🔑 Setup Android keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/animaltimer.keystore
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/animaltimer.keystore
          EOF
      - name: 🔑 Setup iOS signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 📦 Install CocoaPods
        script: cd ios && pod install --repo-update
      - name: 🏗️  Build AAB (Android)
        script: flutter build appbundle --release
      - name: 🏗️  Build IPA (iOS)
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/ios/ipa/*.ipa
