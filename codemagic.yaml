workflows:
  android-release:
    name: Android APK Debug
    max_build_duration: 30
    environment:
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up Gradle
        script: chmod +x gradlew
      - name: Build APK
        script: ./gradlew :androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/androidApp-debug.apk
    publishing:
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true
