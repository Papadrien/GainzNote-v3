# ═══════════════════════════════════════════════════════════════════════════════
# AnimalTimer — CodeMagic CI/CD Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# SETUP REQUIS dans CodeMagic (Variables d'environnement) :
#
# ── Android ──────────────────────────────────────────────────────────────────
#   CM_KEYSTORE          → Fichier .jks / .keystore encodé en base64
#   CM_KEYSTORE_PASSWORD → Mot de passe du keystore
#   CM_KEY_ALIAS         → Alias de la clé
#   CM_KEY_PASSWORD      → Mot de passe de la clé
#
# ── iOS ──────────────────────────────────────────────────────────────────────
#   APP_STORE_CONNECT_ISSUER_ID    → API Key Issuer ID (App Store Connect)
#   APP_STORE_CONNECT_KEY_IDENTIFIER → Key ID
#   APP_STORE_CONNECT_PRIVATE_KEY  → Clé privée .p8 (contenu complet)
#   CERTIFICATE_PRIVATE_KEY        → Clé privée du certificat de distribution
#
# ── Notifications ─────────────────────────────────────────────────────────────
#   SLACK_WEBHOOK_URL    → (Optionnel) URL du webhook Slack
#
# Doc : https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
# ═══════════════════════════════════════════════════════════════════════════════

definitions:
  # ── Environnement Flutter commun ─────────────────────────────────────────
  flutter_env: &flutter_env
    flutter: 3.22.0
    xcode: latest
    cocoapods: default

  # ── Scripts partagés ─────────────────────────────────────────────────────
  scripts:
    - &remove_v1_registrant
      name: 🧹 Remove legacy v1 plugin registrant
      script: |
        rm -rf android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
        rm -rf android/app/src/main/java/io/flutter/plugins
        rm -rf android/app/src/main/java/io/flutter
        rm -rf android/app/src/main/java/io
        echo "v1 registrant removed (if it existed)"

    - &get_dependencies
      name: 📦 Get Flutter dependencies
      script: flutter pub get

    - &run_code_gen
      name: ⚙️  Run code generation (freezed + riverpod)
      script: dart run build_runner build --delete-conflicting-outputs

    - &run_tests
      name: 🧪 Run unit tests
      script: flutter test --coverage

    - &analyze
      name: 🔍 Flutter analyze
      script: flutter analyze --no-fatal-infos

    - &download_fonts
      name: 🔤 Download Nunito font
      script: |
        mkdir -p assets/fonts
        curl -L "https://fonts.gstatic.com/s/nunito/v26/XRXI3I6Li01BKofiOc5wtlZ2di8HDLshdTk3j77e.woff2" \
          --output assets/fonts/Nunito-Regular.ttf 2>/dev/null || \
          echo "⚠️  Font download skipped — add fonts manually if needed"

# ═══════════════════════════════════════════════════════════════════════════════
# WORKFLOWS
# ═══════════════════════════════════════════════════════════════════════════════
workflows:

  # ─────────────────────────────────────────────────────────────────────────
  # 1. ANDROID — Debug (développement rapide, pas de signature)
  # ─────────────────────────────────────────────────────────────────────────
  android-debug:
    name: 🤖 Android Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: *flutter_env
      android_signing:
        - android_debug_keystore   # Keystore de debug automatique CodeMagic

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: master
          include: true
        - pattern: feature/*
          include: true

    scripts:
      - *remove_v1_registrant
      - *get_dependencies
      - *run_code_gen
      - *analyze
      - *run_tests
      - name: 🏗️  Build Android Debug APK
        script: flutter build apk --debug --flavor development || flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────
  # 2. ANDROID — Release (Google Play Store)
  # ─────────────────────────────────────────────────────────────────────────
  android-release:
    name: 🤖 Android Release — Google Play
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: *flutter_env
      android_signing:
        - android_release_keystore
      vars:
        PACKAGE_NAME: "com.animaltimer.app"

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - *remove_v1_registrant
      - *get_dependencies
      - *run_code_gen
      - *analyze
      - *run_tests

      - name: 🔑 Set up Android keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/animaltimer.keystore
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/animaltimer.keystore
          EOF

      - name: 🏗️  Build Android App Bundle (AAB)
        script: |
          flutter build appbundle \
            --release \
            --build-name=1.0.0 \
            --build-number=$(($(google-play get-latest-build-number \
              --package-name "$PACKAGE_NAME" \
              --tracks=internal) + 1))

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal           # internal → alpha → beta → production
        submit_as_draft: true
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────
  # 3. iOS — Debug (Simulator build)
  # ─────────────────────────────────────────────────────────────────────────
  ios-debug:
    name: 🍎 iOS Debug Build
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      flutter: *flutter_env

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true

    scripts:
      - *get_dependencies
      - *run_code_gen
      - *analyze
      - *run_tests

      - name: 📦 Install CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: 🏗️  Build iOS Debug (no codesign)
        script: |
          flutter build ios \
            --debug \
            --no-codesign \
            --simulator

    artifacts:
      - build/ios/iphonesimulator/Runner.app

  # ─────────────────────────────────────────────────────────────────────────
  # 4. iOS — Release (App Store / TestFlight)
  # ─────────────────────────────────────────────────────────────────────────
  ios-release:
    name: 🍎 iOS Release — App Store / TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      flutter: *flutter_env
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.animaltimer.app
      vars:
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        CERTIFICATE_PRIVATE_KEY: $CERTIFICATE_PRIVATE_KEY
        BUNDLE_ID: "com.animaltimer.app"

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - *get_dependencies
      - *run_code_gen
      - *analyze
      - *run_tests

      - name: 📦 Install CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: 🔑 Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: 🏗️  Build iOS Release IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # Passer à true pour release directe
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────
  # 5. MULTI-PLATFORM — Release complet (Android + iOS simultanés)
  # ─────────────────────────────────────────────────────────────────────────
  release-all:
    name: 🚀 Full Release — Android + iOS
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: *flutter_env
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.animaltimer.app
      android_signing:
        - android_release_keystore
      vars:
        BUNDLE_ID: "com.animaltimer.app"
        PACKAGE_NAME: "com.animaltimer.app"

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'release/v*'
          include: true

    scripts:
      - *remove_v1_registrant
      - *get_dependencies
      - *run_code_gen
      - *analyze
      - *run_tests

      # ── Android signing ──────────────────────────────────────────────────
      - name: 🔑 Setup Android keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/animaltimer.keystore
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/animaltimer.keystore
          EOF

      # ── iOS signing ──────────────────────────────────────────────────────
      - name: 🔑 Setup iOS signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: 📦 Install CocoaPods
        script: cd ios && pod install --repo-update

      # ── Builds parallèles ─────────────────────────────────────────────
      - name: 🏗️  Build AAB (Android)
        script: flutter build appbundle --release

      - name: 🏗️  Build IPA (iOS)
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/ios/ipa/*.ipa
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true
