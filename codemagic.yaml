workflows:

  # ──────────────────────────────────────────
  # Android Debug — auto on push to develop
  # ──────────────────────────────────────────
  android-debug:
    name: Android Debug Build
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "develop"
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Extract version information
        script: |
          # Méthode robuste d'extraction de version
          if [ -f "androidApp/build.gradle.kts" ]; then
            VERSION=$(grep -E '\s*versionName\s*=' androidApp/build.gradle.kts | head -n1 | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
            VERSION_CODE=$(grep -E '\s*versionCode\s*=' androidApp/build.gradle.kts | head -n1 | sed -E 's/.*versionCode\s*=\s*([0-9]+).*/\1/')

            if [ -z "$VERSION" ]; then
              VERSION="1.0.0"
              echo "⚠️  Version par défaut utilisée: $VERSION"
            fi

            if [ -z "$VERSION_CODE" ]; then
              VERSION_CODE="1"
              echo "⚠️  Version code par défaut utilisé: $VERSION_CODE"
            fi

            echo "✅ Version extraite: $VERSION (code: $VERSION_CODE)"
            export VERSION_NAME="$VERSION"
            export VERSION_CODE="$VERSION_CODE"
          else
            echo "⚠️  Fichier androidApp/build.gradle.kts non trouvé, utilisation des valeurs par défaut"
            export VERSION_NAME="1.0.0"
            export VERSION_CODE="1"
          fi

      - name: Build Debug APK
        script: |
          ./gradlew :androidApp:assembleDebug

    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────
  # Android Release — auto on push to master
  # ──────────────────────────────────────────
  android-release:
    name: Android Signed Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      groups:
        - keystore_credentials
      vars:
        CM_KEYSTORE_PATH: /tmp/keystore.jks

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "master"
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_KEYSTORE_PATH

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Extract version information
        script: |
          # Méthode robuste d'extraction de version
          if [ -f "androidApp/build.gradle.kts" ]; then
            VERSION=$(grep -E '\s*versionName\s*=' androidApp/build.gradle.kts | head -n1 | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
            VERSION_CODE=$(grep -E '\s*versionCode\s*=' androidApp/build.gradle.kts | head -n1 | sed -E 's/.*versionCode\s*=\s*([0-9]+).*/\1/')

            if [ -z "$VERSION" ]; then
              VERSION="1.0.0"
              echo "⚠️  Version par défaut utilisée: $VERSION"
            fi

            if [ -z "$VERSION_CODE" ]; then
              VERSION_CODE="1"
              echo "⚠️  Version code par défaut utilisé: $VERSION_CODE"
            fi

            echo "✅ Version extraite: $VERSION (code: $VERSION_CODE)"
            export VERSION_NAME="$VERSION"
            export VERSION_CODE="$VERSION_CODE"
          else
            echo "⚠️  Fichier androidApp/build.gradle.kts non trouvé, utilisation des valeurs par défaut"
            export VERSION_NAME="1.0.0"
            export VERSION_CODE="1"
          fi

      - name: Build Release APK + AAB
        script: |
          ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - androidApp/build/outputs/apk/release/*.apk
      - androidApp/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────
  # iOS Debug — manual only (no auto trigger)
  # ──────────────────────────────────────────
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: latest

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Build KMP framework
        script: |
          ./gradlew :composeApp:linkDebugFrameworkIosArm64

      - name: Build iOS (simulator)
        script: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build

    artifacts:
      - iosApp/build/**/*.app

    publishing:
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────
  # iOS Release — manual only (no auto trigger)
  # ──────────────────────────────────────────
  ios-release:
    name: iOS Signed Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: latest
      groups:
        - apple_credentials

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Build KMP framework
        script: |
          ./gradlew :composeApp:linkReleaseFrameworkIosArm64

      - name: Build iOS archive
        script: |
          cd iosApp
          xcodebuild archive \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath build/iosApp.xcarchive \
            CODE_SIGN_IDENTITY="$APPLE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$APPLE_PROVISIONING_PROFILE"

      - name: Export IPA
        script: |
          cd iosApp
          xcodebuild -exportArchive \
            -archivePath build/iosApp.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - iosApp/build/ipa/*.ipa

    publishing:
      email:
        recipients:
          - ivorydu13@gmail.com
        notify:
          success: true
          failure: true
